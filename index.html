<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文大腦體操 - 新聞閱讀問答產生器</title>
    
    <!-- 引入 PDF 轉換套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary-color: #059669; 
            --primary-hover: #047857; 
            --dark-color: #064e3b;
            --bg-color: #ecfdf5;
            --text-color: #1e293b;
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            padding: 0;
            color: var(--text-color);
        }
        
        .top-banner { background: var(--primary-color); height: 6px; width: 100%; }

        /* --- 控制面板 --- */
        .controls {
            background: white; padding: 20px 24px; border-radius: 0 0 16px 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); max-width: 1100px; margin: 0 auto 20px auto; 
        }
        .controls h2 { margin: 0 0 10px 0; color: var(--dark-color); font-size: 1.6rem; display: flex; align-items: center; gap: 8px;}

        .designer-info {
            background: #d1fae5; padding: 10px 16px; border-radius: 8px; font-size: 0.95rem;
            color: #065f46; margin-bottom: 15px; border-left: 4px solid var(--primary-color);
            line-height: 1.5;
        }

        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 10px; }

        label { font-weight: bold; color: #334155; font-size: 0.95rem; display: block; margin-bottom: 2px; }
        input[type="text"], select, textarea { 
            width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; 
            font-size: 15px; box-sizing: border-box; font-family: inherit;
        }
        select { font-weight: bold; color: #0f172a; }
        optgroup { font-weight: bold; color: var(--primary-color); }
        textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.2); }

        .btn-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; justify-content: flex-end; }
        button { 
            padding: 12px 20px; border: none; border-radius: 8px; font-size: 15px; 
            font-weight: bold; cursor: pointer; color: white; transition: all 0.2s; 
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-gen { background: var(--primary-color); flex: 1; min-width: 150px; }
        .btn-print { background: #475569; }
        .btn-pdf { background: #ea580c; }

        .designer-link {
            display: inline-block;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary-color);
            text-decoration: none;
            margin-bottom: 12px;
            transition: color 0.2s;
        }
        .designer-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        #msgBox { display: none; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; font-weight: bold; font-size: 15px; }

        /* 編輯題庫區 */
        .editor-section {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px;
            margin-top: 5px; max-height: 400px; overflow-y: auto;
        }
        .q-item { background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .q-item-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 6px; color: #475569; font-size: 0.9rem;}
        .q-item input { margin-bottom: 6px; padding: 6px;}
        .q-item .options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

        /* --- 響應式 A4 預覽區 --- */
        .preview-area { width: 100%; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; gap: 30px;}
        .sheet-scaler { transform-origin: top center; margin-bottom: 10px; }

        /* A4 嚴格尺寸設定：210mm x 297mm */
        .sheet {
            background: white; 
            width: 210mm; 
            height: 297mm; 
            padding: 14mm 18mm; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            position: relative;
            overflow: hidden; 
        }

        .sheet-header { border-bottom: 3px double var(--primary-color); padding-bottom: 6px; margin-bottom: 12px; }
        .sheet-title { text-align: center; font-size: 20pt; font-weight: 900; color: #0f172a; margin-bottom: 8px; letter-spacing: 2px; }
        .sheet-info { display: flex; justify-content: space-between; font-size: 12pt; font-weight: bold; color: #334155; }

        /* 閱讀區樣式 (優化為完美適應A4，不溢出) */
        .article-title { font-size: 20pt; font-weight: bold; text-align: center; margin-bottom: 12px; color: #1e293b; }
        .article-content { 
            font-size: 18pt; /* 略調字體大小 */
            line-height: 2.2; /* 最佳化行距，讓250~300字完美填滿不超頁 */
            letter-spacing: 1.5px; 
            text-indent: 36pt; 
            text-align: justify; 
            flex-grow: 1; 
            color: #2e3b4e;
            white-space: pre-wrap;
        }

        /* --- 雙欄測驗區樣式 --- */
        .worksheet-body { flex-grow: 1; padding: 0 2px; display: flex; flex-direction: column; }
        
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            column-gap: 20px;
            row-gap: 10px;
            width: 100%;
        }

        .section-title { 
            grid-column: 1 / -1; font-size: 14pt; font-weight: bold; background: #e2e8f0; 
            display: inline-block; padding: 3px 12px; border-radius: 15px; 
            margin: 4px 0 2px 0; color: #0f172a; justify-self: start;
        }
        
        .mc-question { display: flex; flex-direction: column; }
        .mc-text { font-size: 13.5pt; font-weight: bold; margin-bottom: 4px; line-height: 1.3; color: #1e293b; }
        .mc-options { display: flex; flex-direction: column; gap: 4px; padding-left: 6px; }
        .mc-option { font-size: 12.5pt; display: flex; align-items: center; gap: 8px; color: #334155; }
        .mc-option .circle { width: 16px; height: 16px; border: 2px solid #64748b; border-radius: 50%; display: inline-block; flex-shrink: 0; }

        .sa-question { display: flex; flex-direction: column; }
        .sa-question.free-response { grid-column: 1 / -1; margin-top: 2px; }
        
        .sa-text { font-size: 13.5pt; font-weight: bold; margin-bottom: 4px; line-height: 1.3; color: #1e293b; }
        .sa-line { border-bottom: 2px solid #cbd5e1; height: 26px; margin-bottom: 6px; width: 95%; margin-left: 2.5%; }
        .free-response .sa-line { height: 32px; margin-bottom: 8px; }

        .instruction {
            background: #f8fafc; border: 1px solid #cbd5e1; padding: 8px 15px; border-radius: 8px;
            color: #334155; font-size: 12pt; font-weight: bold; margin-bottom: 12px; text-align: center;
        }

        .sheet-footer { 
            display: flex; justify-content: space-between; font-size: 10pt; color: #64748b; 
            margin-top: auto; padding-top: 8px; border-top: 1px solid #e2e8f0;
        }

        .is-answer .circle { background-color: var(--primary-color); border-color: var(--primary-color); color: white; text-align: center; line-height: 16px; font-size: 11px; }
        .is-answer .circle::after { content: "✓"; }
        .ans-text { color: #dc2626; font-weight: bold; font-size: 12pt; margin-left: 2.5%; border-bottom: 2px dashed #dc2626; display: inline-block; padding: 0 8px; background: #fef2f2; border-radius: 4px; margin-bottom: 4px;}

        #hidden-capture { position: fixed; left: -5000px; width: 210mm; }

        @media print {
            .no-print { display: none; }
            body { background: white; margin: 0; padding: 0;}
            .sheet-scaler { transform: none !important; height: auto !important; margin: 0; }
            .sheet { box-shadow: none; padding: 14mm 18mm; width: 210mm; height: 297mm; page-break-after: always; overflow: hidden; }
            .preview-area { gap: 0; padding: 0; }
        }
    </style>
</head>
<body>

<div class="top-banner no-print"></div>

<div class="controls no-print">
    <h2>📖 語文大腦體操 - 十大主題新聞閱讀問答</h2>
    <a href="https://www.facebook.com/profile.php?id=100063748491881" target="_blank" class="designer-link">設計者：鍾孟修 職能治療師</a>
    <div class="designer-info">
        <b>字數與排版完美匹配：</b>10大類別，每個類別各四篇文章，共40篇，字數精準控制在 <b>250~280 字</b>，搭配最適宜的行距，保證文字大又清晰，非常適合長者閱讀！
    </div>

    <div id="msgBox"></div>

    <div class="flex-row">
        <!-- 左側：文章設定 -->
        <div class="flex-col">
            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">

                <select id="presetSelect" onchange="loadPreset()" style="margin-bottom: 12px; padding: 10px;">

                    <optgroup label="主題一：懷舊記憶">

                        <option value="t1_4">【懷舊】聽廣播的悠閒午後</option>
                    </optgroup>
                    <optgroup label="主題二：健康養生">
                        <option value="t2_1">【健康】正確喝水的好處</option>

                        <option value="t2_4">【健康】多動腦預防失智症</option>
                    </optgroup>
                    <optgroup label="主題三：防詐騙與安全">
                        <option value="t3_1">【防詐】提防假檢警詐騙</option>
                        <option value="t3_2">【防詐】猜猜我是誰電話</option>
                        <option value="t3_3">【防詐】不明的中獎通知</option>
                        <option value="t3_4">【安全】保管好個人存摺印章</option>
                    </optgroup>
                    <optgroup label="主題四：傳統節慶">
                        <option value="t4_1">【節慶】熱鬧的春節圍爐</option>
                        <option value="t4_2">【節慶】端午節包粽子</option>

                        <option value="t4_4">【節慶】冬至吃湯圓添歲數</option>
                    </optgroup>
                    <optgroup label="主題五：在地美食">
                        <option value="t5_1">【美食】台灣經典滷肉飯</option>
                        <option value="t5_2">【美食】國民飲料珍珠奶茶</option>
                        <option value="t5_3">【美食】巷口那攤臭豆腐</option>

                    </optgroup>
                    <optgroup label="主題六：居家生活">
                        <option value="t6_1">【生活】做好資源回收</option>
                        <option value="t6_2">【生活】居家節約用水</option>
                        <option value="t6_3">【生活】冰箱食物的保存</option>
                        <option value="t6_4">【生活】換季衣物的收納</option>
                    </optgroup>
                    <optgroup label="主題七：交通出行">
                        <option value="t7_1">【交通】使用敬老卡搭公車</option>
                        <option value="t7_2">【交通】捷運上的讓座文化</option>
                        <option value="t7_3">【交通】夜間出門穿著亮色</option>
                        <option value="t7_4">【交通】過馬路請走斑馬線</option>
                    </optgroup>
                    <optgroup label="主題八：自然科普">
                        <option value="t8_1">【科普】地震保命三步驟</option>
                        <option value="t8_2">【科普】颱風天的防範準備</option>
                        <option value="t8_3">【科普】認識台灣黑熊</option>
                        <option value="t8_4">【科普】台灣溫泉的特色</option>
                    </optgroup>
                    <optgroup label="主題九：休閒運動">
                        <option value="t9_1">【休閒】公園裡的太極拳</option>
                        <option value="t9_2">【休閒】社區唱歌跳舞聯誼</option>
                        <option value="t9_3">【休閒】陽台種花草的樂趣</option>

                    </optgroup>
                    <optgroup label="主題十：台灣景點">
                        <option value="t10_1">【景點】阿里山森林小火車</option>
                        <option value="t10_2">【景點】南投日月潭風光</option>
                        <option value="t10_3">【景點】花蓮太魯閣峽谷</option>
                        <option value="t10_4">【景點】台北101觀景台</option>
                    </optgroup>
                </select>

                <label>文章標題</label>
                <input type="text" id="articleTitle" placeholder="例如：今日頭條新聞" style="margin-bottom: 12px;">

                <label>文章內容 (精算250~280字，排版最佳)</label>
                <textarea id="articleContent" placeholder="請在此貼上新聞或文章內容..."></textarea>
            </div>
        </div>

        <!-- 右側：問答設定 -->
        <div class="flex-col">
            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; height: 100%; box-sizing: border-box;">
                <h3 style="margin: 0 0 5px 0; color: var(--dark-color); font-size: 1.1rem;">🎯 步驟二：測驗題庫 (共 10 題)</h3>
                
                <div style="font-size: 0.85rem; color: #475569; margin-bottom: 10px;">
                    💡 配置：6題選擇、2題填空、2題自由發揮 (底部留有充足書寫空間)
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin: 0;">題庫即時編輯</label>
                    <select id="showAns" style="width: auto; padding: 4px 8px; font-size: 13px;">
                        <option value="yes">同時產生解答頁</option>
                        <option value="no">不產生解答頁</option>

                <div class="editor-section" id="questionEditor"></div>

        </div>
    </div>

    <div class="btn-group">
        <button class="btn-gen" onclick="renderAllPreviews()">👁️ 預覽與更新考卷</button>
        <button class="btn-print" onclick="window.print()">🖨️ 直接列印 (完美A4)</button>
        <button class="btn-pdf" id="pdfBtn" onclick="downloadPDF()">📱 下載 PDF</button>
    </div>
</div>

<div class="preview-area" id="output"></div>
<div id="hidden-capture"></div>

<script>
    // --- 核心資料 ---
    let currentQuestions = { multipleChoice: [], shortAnswer: [] };

    const universalQuestions = {
        multipleChoice: [
            { q: "這篇文章的類型比較接近下列哪一種？", opts: ["新聞報導或故事", "產品說明書", "食譜教學"], a: 0 },
            { q: "閱讀這篇文章時，您的心情感覺如何？", opts: ["平靜或放鬆", "緊張或擔憂", "沒有特別感覺"], a: 0 },
            { q: "這篇文章中提到的內容，發生時間最可能是？", opts: ["很久以前", "現在或近期", "遙遠的未來"], a: 1 },
            { q: "您覺得這篇文章的難易度如何？", opts: ["很簡單", "剛剛好", "有點困難"], a: 1 },
            { q: "這篇文章的內容與日常生活的關聯性？", opts: ["非常貼近生活", "偶爾會遇到", "幾乎不會遇到"], a: 0 },
            { q: "您會想把這篇文章分享給哪位親朋好友？", opts: ["家人或孩子", "街坊鄰居", "自己收藏就好"], a: 0 }
        ],
        shortAnswer: [
            { q: "請寫下這篇文章的標題：________", a: "(填寫標題)" },
            { q: "請挑選出文章中的一個關鍵字：________", a: "(自由擷取)" },
            { q: "讀完這篇文章後，您有什麼心得或聯想？", a: "(自由發揮)" },
            { q: "如果要把文章重點講給別人聽，您會怎麼說？", a: "(自由發揮)" }
        ]
    };

    // 精準控制在 250~280 字的最佳排版長度，確保單頁不溢出
    const presetData = {
        "t1_1": ["【懷舊】古早味的辦桌文化", "早期農業社會，遇到結婚、入厝或廟會拜拜等重要時刻，最令人期待的就是「辦桌」。辦桌通常會在馬路邊、自家院子或廟前廣場，搭起五顏六色的帆布棚子。總舖師帶著助手，在旁邊用紅磚架起快速爐和大鐵鍋。現場傳來陣陣切菜聲，還有大火快炒的濃郁香氣，讓人口水直流。\n\n大家拉開紅色塑膠椅，圍坐大圓桌旁，吃著豐盛佳餚，和親朋好友熱絡聊天，氣氛熱鬧滾滾。經典菜色包含冷盤拼盤、魚翅羹、紅蟳米糕以及佛跳牆。最後一定會端上甜甜的湯圓或冰品作為完美結尾。吃不完的菜，大家還會打包菜尾湯回家。這不僅是一頓飯，更充滿了早期社會濃厚的人情味，是長輩心中最溫暖的記憶。",
            "早期辦桌通常在哪裡舉辦?|廟前或馬路邊|百貨公司|學校教室|0", "準備料理的主廚大家稱他為?|總舖師|服務生|村長|0", "辦桌時大家通常坐在什麼桌子旁?|長方桌|大圓桌|個人桌|1", "下列哪道是常見的經典菜色?|義大利麵|漢堡薯條|紅蟳米糕|2", "最後一道菜通常是什麼?|苦茶|甜湯或冰品|白飯|1", "文章提到辦桌充滿了什麼?|人情味|火藥味|塑膠味|0",

        "t1_2": ["【懷舊】柑仔店的尋寶時光", "以前沒有便利商店的年代，買東西都要去巷口的「柑仔店」。店裡空間不大，但木製貨架上擺滿了各式商品。從家庭主婦需要的柴米油鹽，到小孩子最愛的玻璃罐裝彈珠、抽抽樂和麥芽糖餅乾，一應俱全。每次經過總會想起那份親切的招呼聲，以及幾塊錢就能獲得的簡單快樂。\n\n柑仔店老闆通常是大家熟悉的街坊鄰居，買東西還能順便話家常、關心彼此近況，甚至忘記帶錢還能稍微賒帳，充滿濃濃人情味。對長輩來說，柑仔店不僅是買賣東西的地方，更是村裡傳遞消息、充滿歡笑的交誼廳。隨著時代進步，傳統店舖越來越少，也讓人更加懷念那段純樸美好的尋寶時光。",

        "t1_3": ["【懷舊】廟口前的布袋戲", "早期台灣社會娛樂不多，遇到廟會酬神時，「布袋戲」就成了男女老少最期待的節目。戲台通常搭在廟前廣場，戲班師傅躲在華麗布幕後方，雙手熟練靈活地操作著精緻戲偶。搭配師傅生動有氣勢的口白，以及熱鬧非凡的北管鑼鼓聲，讓台下觀眾看得目不轉睛、拍手叫好。\n\n小孩子總是興奮地搬板凳擠在最前面，大人則在後面一邊看戲一邊和鄰居泡茶聊天，旁邊還有賣烤香腸的小攤販。在電視機還不普及的年代，夜晚的廟口就是最歡樂的遊樂場。每當戲棚下燈光亮起，經典角色出場時，總能帶來無限樂趣，那是記憶中最美好熱鬧、最讓人懷念的純樸夜晚。",

        "t1_4": ["【懷舊】聽廣播的悠閒午後", "在電視機還不普及的年代，一台木製外殼的收音機是許多家庭最重要的娛樂中心。每天下午時分，長輩們常常一邊做著家庭代工、縫補衣服或是泡茶，一邊轉開收音機收聽廣播節目。廣播頻道五花八門，有「講古仙」用充滿戲劇張力的語調說著精彩的歷史故事，也有點播網專門介紹最新流行的台語老歌。\n\n主持人的聲音總是那麼親切溫暖，就像認識很久的老朋友一樣，陪伴無數人度過悠閒寧靜的午後時光。只要聽到熟悉的廣播片頭曲響起，就能讓人瞬間忘卻一天的辛勞，沉浸在美好的聽覺饗宴中。雖然現在科技發達，但那種充滿溫度的廣播聲音，依然是長輩記憶中無法取代的經典陪伴，讓人深深懷念。",

        "t2_1": ["【健康】正確喝水的好處", "水是人體最重要的成分，佔了體重百分之六十以上。隨著年紀增長，長輩對口渴的感覺會變遲鈍，千萬不能等到口渴了才去喝水。正確的喝水方式應該是「少量多次」，每次大約喝一百五十到兩百毫升的溫開水。早上剛起床時喝一杯溫水，可以幫助喚醒腸胃蠕動、促進排便順暢；而在飯前喝一點水，則可以幫助消化吸收。\n\n不過要特別注意，睡覺前一到兩個小時盡量少喝水，以免半夜需要頻繁起床上廁所，不僅影響睡眠品質，也容易增加夜間跌倒風險。每天大約補充一千五百到兩千毫升的水分，能幫助身體排出毒素。請記得，喝茶或喝湯不能完全取代白開水，多喝水才能保持身體健康有活力。",

        "t2_2": ["【健康】散步預防肌少症", "隨著年齡增加，我們身體的肌肉量會慢慢流失，這容易導致雙腿沒有力氣、關節痠痛，甚至增加跌倒的風險，醫學上稱為「肌少症」。為了有效預防肌少症，最好的方法就是從現在開始保持規律的運動習慣。對長輩來說，做太劇烈的運動可能會受傷，「散步」反而是最安全又有效的日常運動選擇。\n\n建議每天清晨或傍晚，天氣較涼爽時，穿上舒適的運動鞋到附近公園散步三十分鐘。這不僅能活動全身筋骨、維持腿部肌肉基礎力量，還能順便曬曬太陽。曬太陽可幫助身體製造維生素Ｄ，對骨骼健康非常有幫助。如果能約三五好友一起散步聊天，更能保持心情開朗，遠離疾病的困擾。",

        "t3_3": ["【防詐】不明的中獎通知", "有時候手機會突然收到簡訊或陌生訊息，上面寫著恭喜你中了名貴轎車、免費出國旅遊大獎，或是網路抽獎抽中了百萬現金。訊息裡通常會附上一個網址連結請你點擊領獎，甚至有客服人員打來，要求你必須先匯出一筆「手續費、保證金或是所得稅」，才能順利把高額獎金撥款給你。\n\n請務必當心，這百分之百是詐騙集團的陷阱！俗話說：「天底下絕對沒有白吃的午餐」，真正合法的中獎活動，絕對不會要求得獎者先掏出錢來匯款。看到來路不明的網址連結千萬不要點擊，以免手機中毒。更不要在網路上隨便填寫身分證字號、銀行帳號等私人資料，保護好個資才能避免受害。",

        "t4_2": ["【節慶】端午節包粽子", "農曆五月初五是傳統的端午節，這個節日最初是為了紀念偉大的愛國詩人屈原。在端午節這天，家家戶戶最重要的事情就是包粽子。台灣常見的粽子種類豐富，有把糯米先炒過再蒸的北部粽，也有直接用水煮到軟糯的南部粽，裡面包著滷肉、香菇和鹹蛋黃，打開竹葉時總是香氣四溢。\n\n除了吃粽子，端午節正中午還有一個有趣的習俗就是「立蛋」，傳說如果能把生雞蛋立起來，就能為一整年帶來好運。為了祈求平安健康，大家還會在自家大門口掛上艾草和菖蒲，並讓小孩子佩戴裝滿香料的精緻香包，用來驅邪避惡、防止蚊蟲叮咬。各地河邊更會舉辦熱血沸騰的划龍舟比賽，鼓聲震天，非常熱鬧。",

        "t4_3": ["【節慶】中秋節賞月吃柚子", "農曆八月十五是浪漫的中秋節，因為秋高氣爽，這天的月亮看起來總是特別圓亮巨大。中秋節最傳統的習俗，就是全家人會在晚上聚在院子或陽台上，一邊抬頭欣賞皎潔的明月，一邊品嚐美味的月餅和酸甜解膩的柚子。月餅圓圓的形狀，正象徵著一家人團團圓圓、平安幸福的意義。\n\n近年來，台灣更發展出獨特的中秋烤肉文化。到了中秋節傍晚，大街小巷就會開始飄散出陣陣的烤肉香味。親朋好友搬出烤肉架，準備香腸、肉片等豐富食材，大家圍在一起生火烤肉。小孩子還會調皮地把剝下來的柚子皮戴在頭上當成帽子玩耍。一邊聊天一邊吃著熱騰騰的美食，是一年中最溫馨放鬆的團聚時光。",

        "t4_4": ["【節慶】冬至吃湯圓添歲數", "冬至是傳統二十四節氣中非常重要的一天，這天代表太陽直射南回歸線，所以北半球的白天會最短、夜晚會最長。在台灣傳統習俗裡，冬至這天全家人一定要聚在一起吃碗熱呼呼的湯圓。因為湯圓圓圓的形狀象徵著「一家團圓」，而且老一輩常說，吃了一碗冬至湯圓，就代表又平安地「添了一歲」。\n\n湯圓的口味非常多樣化，有包著濃郁花生或黑芝麻的甜湯圓，搭配紅豆湯一起吃，讓人甜在心裡；也有傳統客家風味的鹹湯圓，用大骨熬湯，加入香菇、蝦米、肉絲和茼蒿菜一起煮，吃起來香氣撲鼻、非常有飽足感。當全家人在寒冷冬夜裡一起吃完溫暖的湯圓，就代表準備好心情迎接嶄新的一年了。",

        "t5_1": ["【美食】台灣經典滷肉飯", "要說到台灣最具代表性、最受歡迎的平民美食，絕對非「滷肉飯」莫屬！一碗好吃的滷肉飯，作法可是非常講究。首先要將肥瘦相間的帶皮豬肉切成小小塊的肉丁，放入熱鍋中逼出豬油，再加入香噴噴的油蔥酥、蒜頭、醬油、冰糖及獨家香料。經過幾個小時慢火細細熬煮，豬肉會變得入口即化，變成一鍋油亮焦糖色的濃郁滷汁。\n\n當老闆將這一勺熱騰騰、香氣四溢的滷汁，豪邁地淋在剛煮好、粒粒分明的白米飯上時，那股鹹香滋味真讓人無法抗拒。吃滷肉飯的時候，通常還會搭配一顆滷得入味的滷蛋，以及幾片酸脆解膩的黃蘿蔔或滷筍乾。這碗看似簡單卻充滿層次的美食，是許多人從小吃到大的記憶味道。",

        "t5_3": ["【美食】巷口那攤臭豆腐", "臭豆腐是台灣夜市裡非常有名、也極具爭議性的特色小吃。因為豆腐在製作過程中，必須浸泡在特製的滷水中經過發酵，所以會產生一股非常獨特、強烈的氣味。很多外國遊客第一次聞到都會退避三舍，但對於愛吃的老饕來說，這股味道卻是讓人「聞臭而來」的美味指標。\n\n台灣最常見的吃法是將發酵好的豆腐切塊，下鍋用高溫熱油炸得金黃酥脆。炸好的臭豆腐必須趁熱吃，咬下去外皮酥脆、內部卻軟嫩多汁。這時一定要搭配旁邊附上的酸甜爽口台式高麗菜泡菜，最後再淋上特製的蒜泥醬油或是加點辣椒醬。雖然聞起來臭氣沖天，但在嘴裡咀嚼時卻散發出濃郁黃豆香氣，這種強烈對比令人回味無窮。",

            "臭豆腐因為經過______而有特殊的氣味。|發酵", "吃炸臭豆腐通常會配上酸甜爽口的______。|台式泡菜", "您敢吃臭豆腐嗎？喜歡炸的還是煮的？|自由發揮", "外國人常常怕臭豆腐，您會怎麼向他們介紹這道美食？|自由發揮"],
        
        "t5_4": ["【美食】夏日清涼傳統豆花", "傳統豆花是台灣人從小吃到大，最百吃不膩的古早味甜點之一。它的製作過程費工，需要先將優質的黃豆浸泡後磨成濃郁的豆漿，再加入食用石膏或鹽滷使其凝固。做好的傳統豆花，散發著淡淡的天然豆香，口感非常綿密滑順，入口即化，老少咸宜。\n\n豆花最棒的地方在於它可以隨著季節變換吃法。在酷熱夏天裡，加上滿滿的碎冰水，吃起來透心涼；而在寒冷冬天，則可以換成加入熬煮得熱呼呼、微辣驅寒的薑湯。一碗好吃的豆花，上面可以加上自己喜歡的配料，像是軟爛綿密的花生、甜蜜的紅豆、Ｑ彈的小粉圓或是芋圓。最後淋上古法熬製的黑糖水，吃下這一碗，就能感覺到生活中滿滿的幸福感。",

            "傳統豆花是用______磨成漿製成的。|黃豆", "冬天吃豆花通常會配上熱______。|薑湯", "您吃豆花最喜歡加哪三種配料？|自由發揮", "夏天吃冰豆花和冬天吃熱豆花，您比較喜歡哪一種？|自由發揮"],

        "t6_1": ["【生活】做好資源回收", "愛護我們美麗的地球，其實只要從每天的居家生活做起就可以。面對每天產生的家庭垃圾，我們應該要養成確實做好「垃圾分類」的好習慣。通常家裡的垃圾桶應該分為三大類：不能回收的一般垃圾、可以再利用的資源回收物，以及剩飯剩菜的廚餘。\n\n在資源回收的部分，像是看過的舊報紙紙類、喝完飲料的塑膠瓶、裝醬油的玻璃罐，以及裝玉米粒的鐵鋁罐，這些東西都不能隨便丟棄。我們應該先用水稍微洗淨內部的殘留物，然後踩扁節省空間，最後交給清潔隊回收再利用。落實資源回收不僅能大幅減少焚化爐處理垃圾的負擔，還能讓有用資源循環再生，保護大自然環境，留給下一代一個乾淨健康的地球。",

            "每天家裡的垃圾應該要做好______。|分類", "落實資源回收能保護環境，留給下一代______的地球。|乾淨", "您平常在家有做垃圾分類的習慣嗎？|自由發揮", "哪一種回收物您覺得最佔空間、最難處理？|自由發揮"],
        
        "t6_2": ["【生活】居家節約用水", "台灣雖然四面環海、每年都有降雨，但因為地形非常陡峭，河川短促，下雨帶來的水資源很容易就直接流進大海裡，不易留在水庫中。因此，在日常的居家生活中，我們每個人都應該養成節約用水的好習慣，以備不時之需。\n\n節約用水其實一點都不難，例如：洗澡的時候盡量使用「淋浴」來代替放滿一整缸水的盆浴泡澡；洗米或是洗菜的水，不要直接倒進水槽，可以用水桶留下來，拿去陽台澆花或是沖洗馬桶。另外，在刷牙或是抹肥皂的時候，一定要記得隨手關緊水龍頭，千萬不要讓乾淨的自來水白白流掉。只要大家在生活中多用一點心，一點一滴省下珍貴的水資源，不僅是愛護地球，也是替家裡節省開銷。",
            "台灣為什麼水資源不易留住?|下雨太少|地形陡峭|都被喝光了|1", "居家生活中應該養成什麼好習慣?|浪費水|節約用水|不洗澡|1", "洗澡時建議用什麼方式比較省水?|淋浴|盆浴(泡澡)|去河邊洗|0", "洗菜的水可以留下來做什麼?|喝掉|澆花或沖馬桶|倒掉|1", "用完水應該要隨手做什麼?|不管它|把水龍頭敲壞|關緊水龍頭|2", "節約用水除了愛護地球，還能替家裡?|省錢|花錢|賺大錢|0",
            "洗澡時盡量用______代替盆浴比較省水。|淋浴", "用完水要隨手______水龍頭。|關緊", "您有什麼自己獨門的省水小撇步嗎？|自由發揮", "如果有一天停水了，會對生活造成什麼不方便？|自由發揮"],
        
        "t6_3": ["【生活】冰箱食物的保存", "許多人常有錯誤觀念，以為把食物塞進冰箱就永遠不會壞，其實冰箱並不是萬能的保險箱！如果食物在冰箱裡放得太久，依然會孳生細菌甚至腐敗發霉。所以，剛從菜市場買回來的生鮮食材，應該要盡快處理或烹調。最重要的是，生的肉類和已經煮熟的剩菜，一定要分開存放在不同的層架，避免細菌發生交叉感染。\n\n為了保鮮並防止食物味道混雜，放進冰箱的食物最好都能使用透明保鮮盒裝好，或是用保鮮膜確實包覆緊密。建議在盒子上貼小標籤，寫上購買日期，秉持「先進先出」原則來食用。此外，每隔一段時間就要徹底清理冰箱內部，把過期或壞掉食物丟掉，確保冷氣流通，這樣才能真正守護全家人腸胃健康。",

            "生食和熟食要______存放，避免細菌感染。|分開", "定期______冰箱，不吃過期的食物。|清理", "您平常多久會整理一次冰箱呢？|自由發揮", "冰箱裡最常被遺忘放到過期的是什麼食物？|自由發揮"],
        
        "t6_4": ["【生活】換季衣物的收納", "每當春天變暖或是秋天轉涼，季節開始交替的時候，就是全家人動起來整理衣櫃的好時機。在把厚重的冬衣或是輕薄的夏衣收進櫃子深處之前，有一個非常重要的步驟：一定要先將這些衣服徹底清洗乾淨，並且在陽光下完全曬乾。如果衣服沒有完全乾燥就收起來，隔年拿出來時很容易會長滿黃斑或是發霉，甚至產生難聞的氣味。\n\n如果家裡衣櫃空間不夠大，可以善用市面上販售的「真空壓縮袋」來收納厚棉被和毛衣，這能省下非常多的空間。收納完成後，記得在衣櫃角落放入防潮丸、木炭或是除濕劑，保持衣櫃內部乾燥。在整理過程中，如果發現有超過兩三年都不再穿的舊衣服，不妨清洗後捐給慈善機構做愛心。",
            "什麼時候是整理衣櫃的好時機?|每天|季節交替時|過年時|1", "換季衣服收起來前一定要做什麼?|剪破|清洗乾淨並曬乾|弄髒|1", "為什麼衣服要徹底曬乾才能收?|怕被蟲咬|怕發霉長黃斑|怕變色|1", "可以使用什麼工具來節省衣櫃空間?|紙箱|真空壓縮袋|塑膠袋|1", "衣櫃裡可以放入什麼來防潮?|冰塊|防潮丸或除濕劑|香水|1", "不再穿的舊衣服可以怎麼處理?|燒掉|捐出去做愛心|丟在路上|1",
            "不穿的衣服要清洗乾淨、徹底曬乾以免______。|發霉", "可以使用真空______來節省衣櫃空間。|壓縮袋", "您平常換季收納衣服覺得最麻煩的是什麼？|自由發揮", "如果有一件很久沒穿但捨不得丟的衣服，您會怎麼處理？|自由發揮"],

        "t7_1": ["【交通】使用敬老卡搭公車", "台灣現在的大眾交通運輸系統發展得非常完善，特別是市區的公車，班次密集又方便，是長輩們出門買菜、就醫或找朋友的最佳代步工具。為了鼓勵高齡長者多走出家門參與社會活動，政府在許多縣市都有發行專屬的「敬老愛心卡」。長輩只要持卡搭乘公車，每個月都有補助額度，可以享有免費或是半價的極大優惠。\n\n不過，長輩在搭乘公車時，千萬要把「安全」放在第一位。上車刷卡後要趕快找位子坐下；如果沒有座位必須站著，一定要隨時緊握拉環或扶手，以防公車突然煞車導致重心不穩。快到站時可以先按鈴，但一定要等到公車「完全停妥」後，再站起來走到車門邊刷卡下車。多一分小心，就能平平安安回家。",
            "公車是誰出門的好幫手?|只有年輕人|長輩|嬰兒|1", "許多縣市發行什麼卡讓長輩搭車有優惠?|信用卡|敬老卡|健保卡|1", "長輩使用敬老卡搭公車可享有什麼優惠?|免費便當|免費或半價|買一送一|1", "搭公車站著的時候要記得做什麼?|雙手放開|緊握扶手|跳舞|1", "什麼時候才可以站起來準備下車?|車子還在開|等車子完全停妥|剛上車時|1", "注意乘車安全可以確保出門如何?|很危險|很無聊|平安回家|2",
            "長輩搭公車可以使用______享有優惠。|敬老卡", "等車子完全______後再站起來下車。|停妥", "您平常出門常搭公車嗎？覺得方便嗎？|自由發揮", "搭公車時，最怕遇到什麼樣的情況？|自由發揮"],
        
        "t7_2": ["【交通】捷運上的讓座文化", "捷運是現代都市生活中，最不會塞車、快速又便利的交通工具。走進明亮乾淨的捷運車廂內，你會發現靠近車門的地方，通常設有顏色不同且有特別標示的「博愛座」。這些座位設立的初衷，是為了優先保留給年長的老人、懷孕的婦女、推嬰兒車的家長，以及行動不便或身體突然感到不舒服的乘客使用。\n\n其實，台灣社會一直以來都充滿著濃厚的人情味與同理心。在捷運上，讓座文化已經成為一種美好的習慣。即便博愛座客滿了，許多年輕人只要看到身邊有白髮蒼蒼的長輩或是孕婦上車，就算自己坐在一般座位上，也會立刻起身微笑讓座。這種互相體諒、彼此照顧的溫馨舉動，展現了台灣社會溫暖的良好風氣。",
            "捷運是都市中什麼樣的交通工具?|很慢的|快速便利的|很危險的|1", "車廂內特別標示的座位稱為什麼?|貴賓座|博愛座|經濟座|1", "博愛座應該優先讓給誰?|跑得快的人|老人孕婦及行動不便者|外國人|1", "台灣人看到有需要的人常會怎麼做?|假裝睡覺|主動讓座|把他推開|1", "主動讓座展現了台灣什麼樣的風氣?|冷漠無情|溫暖人情味|愛生氣|1", "如果是一般座位可以讓座嗎?|不可以|可以，看到需要的人就讓|要收費|1",
            "車廂內設有特別標示的「______」。|博愛座", "看到有需要的長輩，大家常會主動______。|讓座", "您搭車時有被讓座的經驗嗎？當時感覺如何？|自由發揮", "如果看到年輕人坐在博愛座上睡著了，您會怎麼想？|自由發揮"],
        
        "t7_3": ["【交通】夜間出門穿著亮色", "為了保持身體健康，許多長輩養成了在天剛亮的清晨去公園做早操，或是吃飽飯後在夜間去散步的良好習慣。然而，清晨和夜晚是交通事故最容易發生的高風險時段。主要是因為這時候天色昏暗、沒有足夠的陽光，導致開車或騎車的駕駛人視線不佳，很難在遠處清楚看見走在路邊的行人。\n\n為了保障自身的生命安全，強烈建議長輩們在夜間或清晨出門運動時，千萬不要穿著黑色、深藍色等暗色系的衣服。應該要穿著黃色、白色等鮮豔明亮的服裝，最好是衣服或鞋子上帶有「反光條」設計的裝備。此外，隨身攜帶一個小手電筒，在過馬路時稍微揮動一下，也能有效提醒來車注意。「讓自己被看見」是保護自己最有效的方法。",
            "長輩清晨或夜間出門要特別注意什麼?|帶零食|交通安全|穿很厚|1", "為什麼清晨或夜間比較危險?|天色昏暗視線不佳|因為很冷|會遇到鬼|0", "建議長輩出門穿什麼顏色的衣服?|黑色或深色|鮮豔或有反光條|透明的|1", "夜間出門可以隨身攜帶什麼工具?|菜刀|手電筒|雨傘|1", "穿亮色衣服是為了讓自己容易?|被看見|被忽略|變漂亮|0", "注意安全的最終目的是什麼?|被警察抓|保護自己避免危險|可以上電視|1",
            "夜間天色昏暗，建議穿著______或有反光條的衣服。|鮮豔", "出門可以隨身攜帶______照明。|手電筒", "您有清晨或晚上出門運動的習慣嗎？|自由發揮", "您出門散步時，有什麼自己特別注意的安全小秘訣？|自由發揮"],
        
        "t7_4": ["【交通】過馬路請走斑馬線", "「馬路如虎口」，這句話一點都不假。長輩在路上步行時，一定要嚴格遵守交通規則。當需要穿越車水馬龍的街道時，絕對不能為了貪圖幾步路的方便，就直接從馬路中間隨意穿越。一定要走到畫有白色條紋的行人穿越道（也就是大家俗稱的斑馬線），或是安全的行人天橋與地下道。\n\n在斑馬線前等待時，要耐心看著行人專用號誌。只有當綠色的「小綠人」亮起時，才可以開始通行。起步前，還要落實「左看、右看、再左看」動作，確認沒有闖紅燈或轉彎的車輛衝過來。如果發現綠燈的秒數已經剩下不到幾秒鐘在閃爍了，千萬不要緊張地小跑步硬闖過去。這時候寧可退回人行道，耐心等待下一個綠燈再從容地慢慢走。",
            "過馬路一定要走哪裡?|馬路中間|斑馬線或天橋|地下水道|1", "看到什麼號誌亮起時才可以通行?|小紅人|小綠人|黃燈|1", "過馬路時頭部應該做什麼動作?|低頭看手機|閉著眼睛|左右察看來車|2", "如果綠燈秒數快結束了該怎麼辦?|快跑過去|等下一個綠燈|走到一半退回來|1", "快變紅燈時千萬不要怎麼做?|站在路邊等|小跑步硬闖|看紅綠燈|1", "過馬路時什麼是第一考量?|速度|安全平安|帥氣|1",
            "過馬路時一定要走______或天橋。|斑馬線", "寧可等下綠燈慢慢走，______永遠是第一考量。|安全", "您覺得現在過馬路，車子會禮讓行人嗎？|自由發揮", "如果遇到紅綠燈壞掉的路口，您會怎麼過馬路？|自由發揮"],

        "t8_1": ["【科普】地震保命三步驟", "台灣因為地理位置正好位於板塊交界的「環太平洋地震帶」上，所以地震非常頻繁，是生活中必須面對的自然現象。當突如其來的地震發生，感覺到地板或建築物開始劇烈搖晃時，千萬不要驚慌失措地大聲尖叫，更不要盲目地往門外亂跑，因為這時候很容易被掉落的物品砸傷。\n\n面對地震，一定要牢記國際通用的保命三步驟：「趴下、掩護、穩住」。第一時間要趕快雙膝著地趴下，接著尋找堅固的桌子躲在下面做掩護，雙手抱住頭部和頸部，最後緊緊握住桌腳穩住身體，直到搖晃完全停止為止。平時在家中，我們也應該未雨綢繆，準備好一個「緊急避難包」，裡面放些礦泉水、乾糧和手電筒，放在門口容易拿取的地方。",
            "台灣為什麼地震頻繁?|天氣太熱|位於地震帶|因為有山|1", "遇到地震時第一時間要怎麼辦?|大聲尖叫|慌張亂跑|不慌張冷靜應對|2", "地震保命三步驟是什麼?|立正、稍息、解散|趴下、掩護、穩住|蹲下、抱頭、快跑|1", "地震時應該躲在哪裡比較安全?|玻璃窗旁|堅固的桌子下|大樹下|1", "躲起來時最重要的是保護身體哪個部位?|肚子|腳趾頭|頭部和頸部|2", "平時家裡應該準備什麼以備不時之需?|很多零食|緊急避難包|撲克牌|1",
            "地震保命三步驟是「______、掩護、穩住」。|趴下", "平時家裡要準備緊急______，以備不時之需。|避難包", "您印象中最深刻的一次地震經歷是什麼？|自由發揮", "您的家裡有準備緊急避難包嗎？裡面放了什麼？|自由發揮"],
        
        "t8_2": ["【科普】颱風天的防範準備", "每年的夏天到秋天這段期間，是台灣最常受到颱風侵襲的季節。颱風往往會帶來極度強烈的陣風和連續不斷的豪大雨，容易造成嚴重的積水或是樹木倒塌。為了保護全家人的生命財產安全，在聽到氣象局發布颱風警報時，一定要提早做好居家的防颱準備工作。\n\n首先，要檢查家裡的門窗是否牢固，玻璃上可以貼上膠帶防爆；接著要走到陽台或是屋頂，把排水溝的落葉和垃圾清理乾淨，防止豪雨來時宣洩不及造成大淹水。此外，家裡也要事先儲備好足夠的物資，例如手電筒、備用電池、乾糧以及乾淨的飲用水，以防突然停電或停水。颱風天風狂雨驟，最好的防範方式就是安心待在家裡關心災情，千萬不要跑去海邊觀浪。",

            "颱風來臨前要檢查______是否牢固。|門窗", "颱風天最好待在______不要隨便出門。|家裡", "您有經歷過停水停電的颱風夜嗎？當時怎麼度過？|自由發揮", "防颱準備的乾糧，您最喜歡買什麼食物？|自由發揮"],
        
        "t8_3": ["【科普】認識台灣黑熊", "台灣黑熊是台灣這片土地上特有且極為珍貴的野生保育類動物，牠們也是台灣唯一原生的熊類。台灣黑熊的外型非常有特色，牠們全身上下長滿了烏黑亮麗的粗毛，最引人注目的特徵，就是在牠們寬闊的胸前，有一塊非常明顯的黃白色「Ｖ」字型斑紋，就像是戴著一條Ｖ字項鍊一樣，非常容易辨認。\n\n牠們通常棲息在人煙稀少的中央山脈深山森林裡。雖然體型龐大看起來很兇猛，但其實台灣黑熊屬於雜食性動物，主要喜歡吃各種植物的果實、樹葉、蜂蜜，偶爾也會吃吃昆蟲。近年來因為人類過度開發山林，導致牠們棲息地越來越小，數量急遽減少。我們每個人都應該具備生態保育的觀念，保護好山林環境，就是保護牠們的家。",

            "台灣黑熊胸前有白色的「______」字型斑紋。|V", "保護______環境，就是保護台灣黑熊的家。|山林", "您有在動物園看過台灣黑熊嗎？覺得牠可愛嗎？|自由發揮", "如果有一天去爬山遇到熊，您覺得該怎麼辦？|自由發揮"],
        
        "t8_4": ["【科普】台灣溫泉的特色", "台灣因為位於活躍的板塊交界處，地底下充滿了豐富的地熱資源，因此造就了台灣從北到南、甚至是東部地區，都擁有多樣且著名的溫泉區。像是台北的北投溫泉、宜蘭的礁溪溫泉、台南的關子嶺泥漿溫泉，以及台東的知本溫泉，每個地方的泉水泉質和特色都不盡相同。\n\n天然的溫泉水中含有像是硫磺、碳酸氫鈉等各種豐富的礦物質成分。當我們把身體浸泡在熱呼呼的溫泉水裡時，高溫不僅能有效促進全身的血液循環，還能舒緩緊繃僵硬的肌肉關節，把累積在體內的疲勞感一掃而空，對保養皮膚也有一定的幫助。特別是在冷颼颼的冬天，安排一趟溫泉之旅，泡個熱湯後再吃頓豐盛的美食，絕對是生活中最頂級的一大享受。",

            "台灣從北到南都有著名的______區。|溫泉", "泡溫泉能促進血液循環、消除______。|疲勞", "您喜歡泡溫泉嗎？最常去哪裡的溫泉？|自由發揮", "泡完溫泉後，您最喜歡吃什麼或喝什麼？|自由發揮"],

        "t9_1": ["【休閒】公園裡的太極拳", "在每天早晨天剛亮的時候，走到住家附近的公園或是學校操場，一定會看到許多長輩正精神奕奕地聚集在一起，打著傳統的太極拳。太極拳是一項非常具有哲理的運動，它的動作看起來非常緩慢且柔和，打拳的過程中非常注重身體的重心轉換以及深長的呼吸調節，強調「以柔克剛、氣沉丹田」。\n\n因為太極拳不需要激烈地跑跳，所以對於年長者的膝蓋和關節來說，不會造成太大的壓力和負擔。醫學研究證明，長期規律地練習太極拳，不僅能鍛鍊下肢的肌肉力量，大幅改善身體的平衡感，進而有效預防日常生活中危險的跌倒意外。同時，打拳時必須全神貫注，這也有助於讓煩躁的心情平靜下來，是一項非常適合高齡者的養生運動。",

            "太極拳的動作______柔和，不會對關節造成負擔。|緩慢", "長期練習能改善平衡感、預防______。|跌倒", "您有打過太極拳或看別人打過嗎？覺得難嗎？|自由發揮", "除了太極拳，您清晨去公園還喜歡做什麼運動？|自由發揮"],
        
        "t9_2": ["【休閒】社區唱歌跳舞聯誼", "誰說老了就只能待在家裡看電視？退休後的生活其實可以安排得非常精彩豐富！現在許多地方的里民中心或是社區發展協會，都會專門為銀髮族舉辦各式各樣有趣的課程與活動，例如：充滿活力的土風舞教學、教大家唱老歌的卡拉OK歡唱班，還有訓練手眼協調的手工藝摺紙課。\n\n非常鼓勵長輩們要勇敢多走出家門，積極參與這些熱鬧的社區活動。這不僅是一個絕佳的機會去學習平時接觸不到的新知識與技能，更重要的是，能夠在那裡認識許多志同道合的新朋友。大家在上課之餘，互相聊天、分享生活大小事。擁有這樣良好且熱絡的人際互動圈，能有效趕走孤獨感，讓人從內到外都保持著年輕、開朗且快樂的健康心態。",
            "退休後的生活可以過得如何?|很無聊|很悲慘|精彩豐富|2", "社區活動中心常舉辦什麼活動?|唱歌跳舞課程|打架|賽車|0", "參與社區活動可以認識誰?|外星人|志同道合新朋友|詐騙集團|1", "和朋友互相聊天分享生活算是一種?|浪費時間|人際互動|做壞事|1", "良好的人際互動能讓人保持什麼心態?|悲觀絕望|年輕開朗快樂|容易生氣|1", "文章鼓勵長輩多做什麼?|待在家裡|走出家門參與活動|一直睡覺|1",

        "t9_3": ["【休閒】陽台種花草的樂趣", "如果您喜歡安靜的休閒活動，那麼在自家的陽台或是小院子裡種植一些花草盆栽，絕對是一個非常療癒的選擇。每天早晨醒來，第一件事就是走到陽台，拿起水壺幫這些綠色植物澆澆水，並細心地用剪刀修剪掉枯黃的枝葉。看著自己親手照顧的植物，從一顆小種子長出翠綠的新芽，甚至綻放出色彩繽紛的花朵，心裡會充滿無法言喻的成就感與喜悅。\n\n其實，我們人類天生就喜歡親近大自然。在水泥叢林的都市裡，能夠每天接觸這些充滿生命力的綠色植物，不僅能綠化、美化我們的居家生活環境，植物散發出的淡淡清香，還能不可思議地幫助我們放鬆緊繃的神經、減輕生活中的焦慮與壓力，對我們生理與心理的健康都有莫大幫助。",

    function parsePresetData(dataArray) {
        let qObj = { multipleChoice: [], shortAnswer: [] };
        for(let i=2; i<=7; i++) {
            let parts = dataArray[i].split('|');
            qObj.multipleChoice.push({ q: parts[0], opts: [parts[1], parts[2], parts[3]], a: parseInt(parts[4]) });
        }
        for(let i=8; i<=11; i++) {
            let parts = dataArray[i].split('|');
            qObj.shortAnswer.push({ q: parts[0], a: parts[1] });
        }
        return qObj;
    }

    window.onload = () => {
        document.getElementById('presetSelect').value = "t1_1";
        loadPreset();
    };

    function loadPreset() {
        const val = document.getElementById('presetSelect').value;
        const titleInput = document.getElementById('articleTitle');
        const contentInput = document.getElementById('articleContent');
        
        if (val && presetData[val]) {
            titleInput.value = presetData[val][0];
            contentInput.value = presetData[val][1];
            currentQuestions = parsePresetData(presetData[val]);
        } else {
            titleInput.value = "";
            contentInput.value = "";
            currentQuestions = JSON.parse(JSON.stringify(universalQuestions));
        }
        renderEditor();
        renderAllPreviews();
    }

    function renderEditor() {
        const editor = document.getElementById('questionEditor');
        let html = '';

        html += `<div style="font-weight:bold; color: var(--primary-color); margin-bottom:8px;">◎ 選擇題 (固定 6 題)</div>`;
        currentQuestions.multipleChoice.forEach((mc, idx) => {
            html += `
            <div class="q-item">
                <div class="q-item-header">選擇題 ${idx + 1}</div>
                <input type="text" value="${mc.q}" placeholder="題目" onchange="updateMC(${idx}, 'q', this.value)">
                <div class="options">
                    <div><input type="radio" name="mc_ans_${idx}" value="0" ${mc.a === 0 ? 'checked' : ''} onchange="updateMC(${idx}, 'a', 0)"> <input type="text" value="${mc.opts[0] || ''}" onchange="updateMCOpt(${idx}, 0, this.value)" style="width:75%"></div>
                    <div><input type="radio" name="mc_ans_${idx}" value="1" ${mc.a === 1 ? 'checked' : ''} onchange="updateMC(${idx}, 'a', 1)"> <input type="text" value="${mc.opts[1] || ''}" onchange="updateMCOpt(${idx}, 1, this.value)" style="width:75%"></div>
                    <div><input type="radio" name="mc_ans_${idx}" value="2" ${mc.a === 2 ? 'checked' : ''} onchange="updateMC(${idx}, 'a', 2)"> <input type="text" value="${mc.opts[2] || ''}" onchange="updateMCOpt(${idx}, 2, this.value)" style="width:75%"></div>
                </div>
            </div>`;
        });

        html += `<div style="font-weight:bold; color: var(--primary-color); margin-top:15px; margin-bottom:8px;">◎ 填空與問答題 (固定 4 題)</div>`;
        currentQuestions.shortAnswer.forEach((sa, idx) => {
            const label = (idx < 2) ? `填空題 ${idx + 7}` : `自由發揮題 ${idx + 7}`;
            html += `
            <div class="q-item">
                <div class="q-item-header">${label}</div>
                <input type="text" value="${sa.q}" placeholder="題目" onchange="updateSA(${idx}, 'q', this.value)">
                <input type="text" value="${sa.a}" placeholder="參考解答" onchange="updateSA(${idx}, 'a', this.value)" style="background:#fef2f2; border-color:#fca5a5;">
            </div>`;
        });

        editor.innerHTML = html;
    }

    function updateMC(idx, field, val) { currentQuestions.multipleChoice[idx][field] = val; }
    function updateMCOpt(qIdx, optIdx, val) { currentQuestions.multipleChoice[qIdx].opts[optIdx] = val; }
    function updateSA(idx, field, val) { currentQuestions.shortAnswer[idx][field] = val; }

    function renderAllPreviews() {
        const title = document.getElementById('articleTitle').value || "閱讀測驗文章";
        const content = document.getElementById('articleContent').value || "請輸入文章內容...";
        const output = document.getElementById('output');
        const showAns = document.getElementById('showAns').value === 'yes';
        
        output.innerHTML = ''; 
        output.appendChild(createReadingPage(title, content));
        output.appendChild(createQuestionPage(title, false));
        if (showAns) output.appendChild(createQuestionPage(title, true));
        updateScale();
    }

    function createReadingPage(title, content) {
        const scaler = document.createElement('div');
        scaler.className = 'sheet-scaler';
        const sheet = document.createElement('div');
        sheet.className = 'sheet';

        sheet.innerHTML = `
            <div class="sheet-header">
                <div class="sheet-title">語文大腦體操：閱讀測驗</div>
                <div class="sheet-info"><span>姓名：__________</span><span>日期：___月___日</span><span>得分：____ / 100</span></div>
            </div>
            <div class="instruction">👁️ 任務一：請仔細閱讀下方文章，然後翻到下一頁回答問題。</div>
            <div class="worksheet-body">
                <div class="article-title">${title}</div>
                <div class="article-content">${content}</div>
            </div>
            <div class="sheet-footer"><span>閱讀頁 - 第 1 頁</span><span>設計者：鍾孟修 職能治療師</span></div>
        `;
        scaler.appendChild(sheet);
        return scaler;
    }

    function createQuestionPage(title, isAns) {
        const scaler = document.createElement('div');
        scaler.className = 'sheet-scaler';
        const sheet = document.createElement('div');
        sheet.className = 'sheet';

        let qCounter = 1;
        let gridHtml = '<div class="questions-grid">';
        
        gridHtml += `<div class="section-title">一、選擇題 (請勾選正確答案)</div>`;
        currentQuestions.multipleChoice.forEach((mc, idx) => {
            gridHtml += `
            <div class="mc-question">
                <div class="mc-text">${qCounter}. ${mc.q}</div>
                <div class="mc-options">
                    ${mc.opts.map((opt, optIdx) => `
                        <div class="mc-option ${(isAns && mc.a === optIdx) ? 'is-answer' : ''}">
                            <div class="circle"></div><span>${opt}</span>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            qCounter++;
        });

        gridHtml += `<div class="section-title">二、想一想，寫一寫 (填空與問答)</div>`;
        currentQuestions.shortAnswer.forEach((sa, idx) => {
            const isFreeResponse = (idx >= 2); 
            const gridClass = isFreeResponse ? 'sa-question free-response' : 'sa-question';
            const lines = isFreeResponse ? 2 : 1; 

            let linesHtml = '';
            if (!isAns) {
                for(let i=0; i<lines; i++) linesHtml += `<div class="sa-line"></div>`;
            } else {
                linesHtml = `<div class="ans-text">解答：${sa.a}</div>`;
            }

            gridHtml += `
            <div class="${gridClass}">
                <div class="sa-text">${qCounter}. ${sa.q}</div>
                ${linesHtml}
            </div>`;
            qCounter++;
        });

        gridHtml += '</div>';

        const pageTitleText = isAns ? `閱讀測驗 (解答卷)` : `閱讀測驗 (問答卷)`;

        sheet.innerHTML = `
            <div class="sheet-header">
                <div class="sheet-title">${pageTitleText}</div>
                <div style="text-align:center; font-size:14pt; font-weight:bold; color:#475569; margin-bottom:10px;">主題：${title}</div>
            </div>
            ${!isAns ? `<div class="instruction">✍️ 任務二：請根據剛剛閱讀的文章，回答下列問題。</div>` : ''}
            <div class="worksheet-body">${gridHtml}</div>
            <div class="sheet-footer"><span>${isAns ? '解答頁' : '測驗頁'}</span><span>設計者：鍾孟修 職能治療師</span></div>
        `;
        scaler.appendChild(sheet);
        return scaler;
    }

    function updateScale() {
        const previewArea = document.querySelector('.preview-area');
        if (!previewArea) return;
        
        const containerWidth = previewArea.clientWidth - 40;
        const scalers = document.querySelectorAll('.sheet-scaler');
        if (scalers.length === 0) return;
        
        const sheetWidth = 210 * 3.7795; 
        let scale = containerWidth / sheetWidth;
        if (scale > 1) scale = 1; 
        
        scalers.forEach(s => {
            s.style.transform = `scale(${scale})`;
            s.style.height = (297 * 3.7795 * scale) + "px";
        });
    }

    window.addEventListener('resize', updateScale);

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const btn = document.getElementById('pdfBtn');
        const sheets = document.querySelectorAll('.sheet');
        const hidden = document.getElementById('hidden-capture');
        
        if (sheets.length === 0) return;
        
        btn.disabled = true;
        btn.innerText = "⏳ 準備轉換 PDF...";

        try {
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();

            for (let i = 0; i < sheets.length; i++) {
                btn.innerText = `⏳ 轉換單元 ${i+1}/${sheets.length}...`;
                
                const clone = sheets[i].cloneNode(true);
                clone.style.transform = "none";
                hidden.appendChild(clone);
                
                const canvas = await html2canvas(clone, { scale: 1.5, useCORS: true }); 
                hidden.removeChild(clone);
                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            }
            
            const title = document.getElementById('articleTitle').value || '閱讀測驗';
            pdf.save(`語文大腦體操_${title}.pdf`);
            
            const msgBox = document.getElementById('msgBox');
            msgBox.innerText = "✅ PDF 下載完成！";
            msgBox.style.display = 'block';
            msgBox.style.backgroundColor = '#d1fae5';
            msgBox.style.color = '#065f46';
            setTimeout(() => msgBox.style.display = 'none', 3000);
            
        } catch (e) {
            console.error(e);
            alert("轉換 PDF 發生錯誤，請直接使用「直接列印」按鈕。");
        } finally {
            btn.disabled = false;
            btn.innerText = "📱 下載 PDF";
        }
    }
</script>
